name : CI pipeline demo
on:
 push:
   branches: ["main"]
   jobs:
   build stages:
    runs-on: ubunto-22.04
      steps:
       -uses : actions/checkout@v6.0.2
       -uses :  actions/setup-node@v6.4.0
       with: 
       node-version : 18
       cache : 'npm'
       -run : npm ci
       -run : npm  run build
       uses : actions/upload-artifact@v7.0.1
       with:
       name: build_artifacts
       path: dist
       
       
       
    
   
   
